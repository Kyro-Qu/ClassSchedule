<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>电子信息工程(专升本)2025(2)班课表</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3efe7;
      --bg-alt: #e8eef4;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.88);
      --text: #14212e;
      --muted: #617184;
      --line: rgba(20, 33, 46, 0.12);
      --shadow: 0 24px 60px rgba(31, 42, 55, 0.12);
      --accent: #1e6f8c;
      --accent-2: #d67f3f;
      --accent-3: #5f7f5d;
      --accent-4: #8e6f52;
      --accent-5: #7b5ca7;
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Heiti SC", "SimHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(30, 111, 140, 0.16), transparent 36%),
        radial-gradient(circle at top right, rgba(214, 127, 63, 0.14), transparent 32%),
        radial-gradient(circle at bottom left, rgba(95, 127, 93, 0.10), transparent 34%),
        linear-gradient(135deg, var(--bg), var(--bg-alt));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(20, 33, 46, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20, 33, 46, 0.02) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), transparent 88%);
      opacity: 0.55;
    }

    .page {
      width: min(1400px, calc(100vw - 32px));
      margin: 24px auto 40px;
      position: relative;
      z-index: 1;
    }

    .hero,
    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: 28px;
      margin-bottom: 20px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -8% -30% auto;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30, 111, 140, 0.18), transparent 68%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(30, 111, 140, 0.12);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 14px 0 10px;
      font-family: "Songti SC", "STSong", "SimSun", "Microsoft YaHei UI", serif;
      font-size: clamp(32px, 4vw, 56px);
      line-height: 1.08;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .hero p {
      margin: 0;
      max-width: 900px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .hero-meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
    }

    .meta-card {
      padding: 16px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(20, 33, 46, 0.08);
    }

    .meta-card span {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .meta-card strong {
      display: block;
      font-size: 18px;
      line-height: 1.3;
    }

    .panel {
      border-radius: var(--radius-xl);
      padding: 22px;
      margin-bottom: 18px;
    }

    .panel-head {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .timetable-head {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-height: 48px;
    }

    .timetable-center-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      text-align: center;
      font-weight: 800;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      pointer-events: none;
    }

    .panel-title {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .panel-title p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(30, 111, 140, 0.10);
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .week-picker {
      appearance: none;
      border: 1px solid rgba(20, 33, 46, 0.12);
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 34px 10px 14px;
      font: inherit;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(20, 33, 46, 0.65) 50%),
        linear-gradient(135deg, rgba(20, 33, 46, 0.65) 50%, transparent 50%);
      background-position:
        calc(100% - 16px) calc(50% - 2px),
        calc(100% - 10px) calc(50% - 2px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    .week-picker:hover {
      transform: translateY(-1px);
      border-color: rgba(30, 111, 140, 0.35);
      box-shadow: 0 10px 24px rgba(30, 111, 140, 0.10);
    }

    .week-picker:focus {
      outline: none;
      border-color: rgba(30, 111, 140, 0.48);
      box-shadow: 0 0 0 3px rgba(30, 111, 140, 0.12);
    }

    .week-picker:active {
      transform: translateY(0);
    }


    .timetable-shell {
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-gutter: stable both-edges;
    }

    .timetable {
      min-width: 1120px;
      display: grid;
      grid-template-columns: 94px repeat(7, minmax(130px, 1fr));
      gap: 10px;
    }

    .grid-head,
    .grid-period,
    .grid-cell {
      border-radius: 18px;
      border: 1px solid rgba(20, 33, 46, 0.08);
      background: rgba(255, 255, 255, 0.68);
      box-shadow: 0 8px 18px rgba(20, 33, 46, 0.05);
    }

    .grid-head {
      min-height: 74px;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      position: sticky;
      top: 10px;
      z-index: 2;
      backdrop-filter: blur(8px);
    }

    .grid-head .day-name {
      font-size: 16px;
      font-weight: 800;
    }

    .grid-head .day-date {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .grid-head.today-col {
      border-color: rgba(30, 111, 140, 0.34);
      background: linear-gradient(180deg, rgba(30, 111, 140, 0.18), rgba(255, 255, 255, 0.78));
    }

    .grid-head.corner {
      align-items: flex-start;
      background: linear-gradient(135deg, rgba(30, 111, 140, 0.12), rgba(255, 255, 255, 0.74));
    }

    .grid-period {
      min-height: 128px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      position: sticky;
      left: 0;
      z-index: 1;
      backdrop-filter: blur(8px);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(245, 240, 232, 0.92));
    }

    .grid-period .period-label {
      font-size: 15px;
      font-weight: 800;
    }

    .grid-period .period-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .grid-cell {
      min-height: 128px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .grid-cell.today-col {
      border-color: rgba(30, 111, 140, 0.28);
      background: linear-gradient(180deg, rgba(30, 111, 140, 0.08), rgba(255, 255, 255, 0.74));
    }

    .grid-cell.empty {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.40));
    }

    .grid-cell.empty .empty-note {
      flex: 1;
      margin: 0;
      min-height: 100px;
      padding: 12px;
      border-radius: 14px;
      border: 1px dashed rgba(20, 33, 46, 0.14);
      background: rgba(255, 255, 255, 0.58);
      color: rgba(97, 113, 132, 0.92);
      font-size: 13px;
      line-height: 1.6;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.02em;
    }

    .course-card {
      --accent-color: var(--accent);
      --accent-soft: rgba(30, 111, 140, 0.14);
      padding: 12px 12px 11px;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.78)),
        var(--accent-soft);
      border: 1px solid rgba(20, 33, 46, 0.08);
      border-left: 5px solid var(--accent-color);
      display: grid;
      gap: 8px;
      box-shadow: 0 10px 20px rgba(20, 33, 46, 0.06);
    }

    .course-card .title {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.35;
    }

    .course-card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(20, 33, 46, 0.06);
      color: var(--text);
      font-size: 12px;
      line-height: 1;
    }

    .course-list {
      display: grid;
      gap: 8px;
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    @media (min-width: 1440px) {
      .page {
        width: min(1500px, calc(100vw - 56px));
      }

      .hero,
      .panel {
        padding: 30px;
      }

      .timetable {
        min-width: 1240px;
        grid-template-columns: 110px repeat(7, minmax(150px, 1fr));
      }
    }

    @media (min-width: 960px) and (max-width: 1280px) and (orientation: landscape) {
      .page {
        width: min(100vw - 20px, 1320px);
        margin: 14px auto 24px;
      }

      .hero,
      .panel {
        padding: 20px;
      }

      .hero h1 {
        font-size: clamp(30px, 3.3vw, 44px);
      }

      .hero-meta {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .panel-head {
        gap: 10px 12px;
      }

      .timetable-center-title {
        font-size: 22px;
      }

      .week-picker {
        font-size: 15px;
        padding: 9px 32px 9px 12px;
      }

      .timetable {
        min-width: 980px;
        grid-template-columns: 82px repeat(7, minmax(116px, 1fr));
        gap: 8px;
      }

      .grid-head,
      .grid-period,
      .grid-cell {
        border-radius: 14px;
      }

      .grid-head {
        min-height: 66px;
        padding: 10px;
      }

      .grid-head .day-name {
        font-size: 14px;
      }

      .grid-cell,
      .grid-period {
        min-height: 110px;
      }

      .course-card {
        padding: 10px;
      }

      .course-card .title {
        font-size: 14px;
      }
    }

    @media (max-width: 1100px) {
      .hero-meta {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .timetable {
        min-width: 980px;
      }
    }

    @media (max-width: 900px) {
      .page {
        width: min(100vw - 14px, 1400px);
      }

      .panel-title h2 {
        font-size: 20px;
      }

      .timetable-center-title {
        font-size: 20px;
      }

      .status-pill {
        font-size: 13px;
        padding: 9px 12px;
      }

      .timetable {
        min-width: 920px;
        grid-template-columns: 78px repeat(7, minmax(112px, 1fr));
      }
    }

    @media (max-width: 760px) {
      .page {
        width: min(100vw - 18px, 1400px);
        margin: 10px auto 24px;
      }

      .hero,
      .panel {
        padding: 18px;
        border-radius: 22px;
      }

      .hero h1 {
        font-size: clamp(26px, 8vw, 34px);
        line-height: 1.12;
      }

      .hero p {
        font-size: 14px;
        line-height: 1.6;
      }

      .hero-meta {
        grid-template-columns: 1fr;
      }

      .meta-card {
        padding: 14px;
      }

      .toolbar {
        align-items: stretch;
      }

      .status-pill {
        width: 100%;
        justify-content: center;
      }

      .timetable-head {
        display: grid;
        grid-template-columns: 1fr;
        justify-items: center;
        min-height: 0;
      }

      .timetable-center-title {
        font-size: 18px;
        position: static;
        transform: none;
      }

      .week-picker {
        font-size: 14px;
        padding: 8px 30px 8px 10px;
        justify-self: center;
      }

      .timetable {
        min-width: 860px;
        grid-template-columns: 72px repeat(7, minmax(104px, 1fr));
        gap: 7px;
      }

      .grid-head,
      .grid-period,
      .grid-cell {
        border-radius: 12px;
      }

      .grid-head {
        min-height: 58px;
        padding: 8px;
      }

      .grid-head .day-name {
        font-size: 13px;
      }

      .grid-head .day-date {
        font-size: 11px;
      }

      .grid-period,
      .grid-cell {
        min-height: 100px;
        padding: 8px;
      }

      .grid-period .period-label {
        font-size: 13px;
      }

      .grid-period .period-meta {
        font-size: 11px;
      }

      .course-card {
        padding: 9px;
        gap: 6px;
      }

      .course-card .title {
        font-size: 13px;
      }

      .course-card .meta,
      .tag {
        font-size: 11px;
      }

      .grid-cell.empty .empty-note {
        min-height: 84px;
        padding: 10px;
        font-size: 12px;
      }
    }

    @media (max-width: 430px) {
      .page {
        width: calc(100vw - 10px);
      }

      .hero,
      .panel {
        padding: 14px;
        border-radius: 18px;
      }

      .eyebrow {
        font-size: 12px;
        padding: 7px 12px;
      }

      .hero h1 {
        font-size: clamp(24px, 8.4vw, 30px);
      }

      .timetable {
        min-width: 820px;
      }
    }
  </style>
</head>

    ];

    const timetableRoot = document.getElementById('timetable');
    const weekPicker = document.getElementById('week-picker');

    const today = new Date();
    const todayWeek = getCurrentWeek(today);
    let selectedWeek = todayWeek;

    function getWeekdayIndex(date) {
      const day = date.getDay();
      return day === 0 ? 6 : day - 1;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getCurrentWeek(date) {
      const diff = Math.floor((startOfDay(date) - startOfDay(TERM_START)) / DAY_MS);
      if (diff < 0) {
        return 1;
      }
      return clamp(Math.floor(diff / 7) + 1, 1, TOTAL_WEEKS);
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function addDays(date, days) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate() + days);
    }

    function formatDate(date) {
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function getWeekRange(week) {
      const start = addDays(TERM_START, (week - 1) * 7);
      const end = addDays(start, 6);
      return `${formatDate(start)} 至 ${formatDate(end)}`;
    }

    function isCourseActive(course, week) {
      return course.weekRule(week);
    }

    function createTag(text) {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = text;
      return tag;
    }

    function createCourseCard(course) {
      const card = document.createElement('article');
      card.className = 'course-card';
      card.style.setProperty('--accent-color', course.accent);
      card.style.setProperty('--accent-soft', `${course.accent}20`);

      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = course.title;

      const meta = document.createElement('div');
      meta.className = 'meta';
      const tags = [
        course.location,
        `教师 ${course.teacher}`,
      ];
      tags.forEach((text) => meta.appendChild(createTag(text)));

      card.appendChild(title);
      card.appendChild(meta);
      return card;
    }

    function renderWeekPicker() {
      weekPicker.innerHTML = '';
      for (let week = 1; week <= TOTAL_WEEKS; week += 1) {
        const option = document.createElement('option');
        option.value = String(week);
        option.textContent = `第 ${week} 周`;
        weekPicker.appendChild(option);
      }
    }

    function renderTimetable() {
      timetableRoot.innerHTML = '';
      const isCurrentCalendarWeek = selectedWeek === getCurrentWeek(new Date());
      const todayDayIndex = getWeekdayIndex(new Date());

      const corner = document.createElement('div');
      corner.className = 'grid-head corner';
      corner.innerHTML = '<div class="day-name">节次 / 星期</div><div class="day-date">第 ' + selectedWeek + ' 周</div>';
      timetableRoot.appendChild(corner);

      weekdays.forEach((day, dayIndex) => {
        const header = document.createElement('div');
        header.className = 'grid-head';
        if (isCurrentCalendarWeek && dayIndex === todayDayIndex) {
          header.classList.add('today-col');
        }
        const date = addDays(TERM_START, (selectedWeek - 1) * 7 + dayIndex);
        header.innerHTML = `<div class="day-name">${day.name}</div><div class="day-date">${formatDate(date)}</div>`;
        timetableRoot.appendChild(header);
      });

      periods.forEach((period, periodIndex) => {
        const periodCell = document.createElement('div');
        periodCell.className = 'grid-period';
        periodCell.innerHTML = `<div class="period-label">${period.label}</div><div class="period-meta">${period.meta}</div>`;
        timetableRoot.appendChild(periodCell);

        weekdays.forEach((day, dayIndex) => {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          if (isCurrentCalendarWeek && dayIndex === todayDayIndex) {
            cell.classList.add('today-col');
          }
          const items = courses
            .filter((course) => course.day === dayIndex && course.period === periodIndex && isCourseActive(course, selectedWeek))
            .sort((left, right) => left.title.localeCompare(right.title, 'zh-CN'));

          if (items.length === 0) {
            cell.classList.add('empty');
            const empty = document.createElement('p');
            empty.className = 'empty-note';
            empty.textContent = '无课程安排';
            cell.appendChild(empty);
          } else {
            const list = document.createElement('div');
            list.className = 'course-list';
            items.forEach((course) => list.appendChild(createCourseCard(course)));
            cell.appendChild(list);
          }

          timetableRoot.appendChild(cell);
        });
      });
    }

    function updateControls() {
      weekPicker.value = String(selectedWeek);
    }

    function setSelectedWeek(week) {
      selectedWeek = clamp(week, 1, TOTAL_WEEKS);
      updateControls();
      renderTimetable();
    }

    function syncToCurrentWeek() {
      const currentWeek = getCurrentWeek(new Date());
      if (currentWeek !== selectedWeek) {
        setSelectedWeek(currentWeek);
      }
    }

    renderWeekPicker();
    weekPicker.addEventListener('change', (event) => {
      setSelectedWeek(Number(event.target.value));
    });
    setSelectedWeek(selectedWeek);
    syncToCurrentWeek();
  </script>
